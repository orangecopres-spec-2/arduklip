[gcode_macro MOTOR_FORWARD]
description: Spin custom stepper motor forward
gcode:
    RESPOND MSG="RUN_MOTOR_FORWARD"

[gcode_macro MOTOR_REVERSE]
description: Spin custom stepper motor backward
gcode:
    RESPOND MSG="RUN_MOTOR_REVERSE"

[gcode_macro MOTOR_UP]
description: Spin custom stepper motor up      
gcode:
    RESPOND MSG="RUN_MOTOR_UP"

[gcode_macro MOTOR_DOWN]
description: Spin custom stepper motor down    
gcode:
    RESPOND MSG="RUN_MOTOR_DOWN"

[gcode_macro MOTOR_E+]
description: Spin custom stepper motor extruder
gcode:
    RESPOND MSG="RUN_MOTOR_E+"

[gcode_macro MOTOR_E-]
description: Spin custom stepper motor extruder
gcode:
    RESPOND MSG="RUN_MOTOR_E-"

[gcode_macro MOTOR_Y+]
description: Spin custom stepper motor y axi   
gcode:
    RESPOND MSG="RUN_MOTOR_Y+"

[gcode_macro MOTOR_Y-]
description: Spin custom stepper motor y axi
gcode:
    RESPOND MSG="RUN_MOTOR_Y-"
